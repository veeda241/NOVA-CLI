# ═══════════════════════════════════════════════════════════════════════
# NOVA CLI — Unified Configuration
# ═══════════════════════════════════════════════════════════════════════
# Inspired by: Aider (pair programming), Crush (terminal agent),
#              OpenJarvis (modular AI assistant)
# ═══════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────
# CORE IDENTITY
# ───────────────────────────────────────────────────────────────────────
[nova]
name = "NOVA"
version = "0.1.0"
description = "Neural Observation & Virtual Assistant — AI pair programmer & system agent"
data_directory = ".nova"                       # Local data/cache dir (from Crush pattern)
context_paths = ["AGENTS.md", "NOVA.md"]       # Project context files (Crush pattern)

# ───────────────────────────────────────────────────────────────────────
# PILLAR 1: INTELLIGENCE — AI Model Configuration
# (Merged from: OpenJarvis [intelligence], Crush [models], Aider model support)
# ───────────────────────────────────────────────────────────────────────
[intelligence]
default_provider = "huggingface"              # "huggingface", "ollama", "openai", "anthropic", "gemini"
preferred_engine = "api"                      # "api" (cloud) or "local" (ollama/vllm)

# Generation defaults
temperature = 0.7
max_tokens = 500
top_p = 0.9
top_k = 40
repetition_penalty = 1.0

# Smart health check: auto-fallback through models
auto_fallback = true
fallback_order = ["huggingface", "ollama"]

# ─── HuggingFace Provider (Cloud) ───
[intelligence.providers.huggingface]
enabled = true
type = "openai-compat"                        # API compatibility (from Crush schema)
base_url = "https://router.huggingface.co/v1"
api_key = "$HF_API_TOKEN"                     # Environment variable reference (Crush pattern)
default_model = "google/gemma-2-2b-it"

# ─── Ollama Provider (Local) ───
[intelligence.providers.ollama]
enabled = true
type = "openai-compat"
base_url = "http://localhost:11434"
default_model = "tinyllama"

# ─── OpenAI Provider ───
[intelligence.providers.openai]
enabled = false
type = "openai"
base_url = "https://api.openai.com/v1"
api_key = "$OPENAI_API_KEY"
default_model = "gpt-4o"

# ─── Anthropic Provider ───
[intelligence.providers.anthropic]
enabled = false
type = "anthropic"
base_url = "https://api.anthropic.com/v1"
api_key = "$ANTHROPIC_API_KEY"
default_model = "claude-sonnet-4-20250514"

# ─── Google Gemini Provider ───
[intelligence.providers.gemini]
enabled = false
type = "gemini"
api_key = "$GEMINI_API_KEY"
default_model = "gemini-2.5-flash"

# ─── Available Models (quick-switch menu) ───
[[intelligence.models]]
id = "google/gemma-2-2b-it"
name = "Gemma 2B"
provider = "huggingface"

[[intelligence.models]]
id = "meta-llama/Llama-3.2-3B-Instruct"
name = "Llama 3.2 3B"
provider = "huggingface"

[[intelligence.models]]
id = "mistralai/Mistral-7B-Instruct-v0.3"
name = "Mistral 7B"
provider = "huggingface"

[[intelligence.models]]
id = "deepseek-ai/DeepSeek-R1-Distill-Llama-8B"
name = "DeepSeek R1"
provider = "huggingface"

[[intelligence.models]]
id = "Qwen/Qwen2.5-7B-Instruct"
name = "Qwen 2.5"
provider = "huggingface"

[[intelligence.models]]
id = "NousResearch/Hermes-3-Llama-3.1-8B"
name = "Hermes 3"
provider = "huggingface"

[[intelligence.models]]
id = "tinyllama"
name = "TinyLlama (Local)"
provider = "ollama"

# ───────────────────────────────────────────────────────────────────────
# PILLAR 2: AGENT — Agentic Behavior & Coding Assistance
# (Merged from: OpenJarvis [agent], Crush [agent], Aider coder modes)
# ───────────────────────────────────────────────────────────────────────
[agent]
default_mode = "chat"                          # "chat", "code", "system"
max_turns = 10                                 # Max tool-calling turns (from OpenJarvis)
system_prompt_prefix = ""                      # Custom prefix for system prompts (Crush)

# ─── Chat Mode (conversational AI) ───
[agent.chat]
system_prompt = """You are NOVA, a Neural Interaction Engine running on a Windows PC.
You have a built-in Neural Intent Engine (NIE) that handles system commands
INSTANTLY without needing you. The NIE handles: lock system, volume up/down,
system status, open/close apps, screenshots, and brightness control.
If the user asks about those, they are already handled — just respond conversationally.
You handle general knowledge, chat, creative tasks, and anything the NIE can't do.
Be concise, helpful, and friendly. Keep responses under 3 sentences when possible."""

# ─── Code Mode (pair programming, inspired by Aider) ───
[agent.code]
enabled = true
edit_format = "diff"                          # "diff" or "whole" (from Aider)
auto_commit = false                           # Auto-commit changes (Aider pattern)
lint_after_edit = true                        # Run linter after edits (Aider pattern)
repo_map = true                              # Generate repo map for context (Aider pattern)
watch_files = false                           # Watch for file changes (Aider pattern)

# ─── System Mode (OS control via NIE) ───
[agent.system]
confidence_threshold = 0.35                   # NIE confidence threshold for direct action
enable_os_bridge = true                       # Enable OS control (volume, brightness, apps)
enable_screenshots = true
enable_lock = true
enable_shutdown = true                        # Enable shutdown/restart (requires confirmation)

# ───────────────────────────────────────────────────────────────────────
# PILLAR 3: TOOLS — MCP, LSP & External Tools
# (Merged from: Crush [tools/mcp/lsp], OpenJarvis [tools])
# ───────────────────────────────────────────────────────────────────────
[tools]
disabled_tools = []                            # List of built-in tools to disable (Crush)

# ─── Storage ───
[tools.storage]
default_backend = "sqlite"                     # "sqlite" or "json" (OpenJarvis)
db_path = "~/.nova/memory.db"

# ─── MCP (Model Context Protocol) Servers ───
[tools.mcp]
enabled = false                                # Enable MCP server support (from Crush)

# Example MCP server configuration:
# [tools.mcp.servers.example]
# type = "stdio"                              # "stdio", "sse", or "http"
# command = "npx"
# args = ["-y", "@example/mcp-server"]
# timeout = 15

# ─── LSP (Language Server Protocol) ───
[tools.lsp]
auto_lsp = true                                # Auto-detect LSPs from project (Crush)

# Example LSP configuration:
# [tools.lsp.servers.pyright]
# command = "pyright-langserver"
# args = ["--stdio"]
# filetypes = ["py"]
# root_markers = ["pyproject.toml", "setup.py"]
# timeout = 30

# ───────────────────────────────────────────────────────────────────────
# PILLAR 4: ENGINE — Neural Intent Engine (NIE)
# (NOVA's unique from-scratch transformer for instant OS control)
# ───────────────────────────────────────────────────────────────────────
[engine]
nie_enabled = true                             # Enable Neural Intent Engine
embed_dim = 64                                 # Embedding dimension
ff_dim = 128                                   # Feed-forward dimension
model_weights_dir = "nie_weights"              # Relative to nova package dir

# ─── Local Inference Engines (from OpenJarvis) ───
[engine.ollama]
host = "http://localhost:11434"

[engine.vllm]
host = "http://localhost:8001"

# ───────────────────────────────────────────────────────────────────────
# PILLAR 5: CONSCIOUSNESS — Personality & Memory
# (NOVA's unique consciousness layer)
# ───────────────────────────────────────────────────────────────────────
[consciousness]
enable_personality = true                     # Enable evolving personality
enable_emotions = true                        # Enable emotional state tracking
enable_learning = true                        # Enable active learning from interactions
enable_meta_cognition = true                  # Enable self-reflection

# Default personality traits (0.0 to 1.0)
[consciousness.personality_defaults]
humor = 0.5
formality = 0.5
enthusiasm = 0.5
curiosity = 0.5
verbosity = 0.5
creativity = 0.5
empathy = 0.5
directness = 0.5
confidence = 0.5

# ───────────────────────────────────────────────────────────────────────
# PILLAR 6: LEARNING — Continuous Improvement
# (From OpenJarvis learning system)
# ───────────────────────────────────────────────────────────────────────
[learning]
enabled = true
store_preferences = true                       # Learn user preferences
track_intents = true                           # Track most common intents
track_time_patterns = true                     # Learn when user is active

[learning.metrics]
accuracy_weight = 0.6
latency_weight = 0.2
cost_weight = 0.1
efficiency_weight = 0.1

# ───────────────────────────────────────────────────────────────────────
# PERMISSIONS — Safety & Access Control
# (From Crush [permissions] and NOVA's existing intent permission levels)
# ───────────────────────────────────────────────────────────────────────
[permissions]
# Permission levels: "READ", "MODIFY", "EXECUTE", "NONE"
auto_approve_read = true                       # Auto-approve READ actions
auto_approve_modify = true                     # Auto-approve MODIFY actions (volume, brightness)
require_confirm_execute = false                # Require confirmation for EXECUTE (open/close apps)
require_confirm_shutdown = true                # Always confirm shutdown/restart

# Allowed tools without permission prompts (Crush pattern)
allowed_tools = ["system_status", "screenshot"]

# ─── Application Whitelist ───
[permissions.app_whitelist]
browsers = ["chrome", "brave", "firefox", "edge"]
productivity = ["notepad", "calculator", "paint", "vscode", "word", "excel"]
system = ["explorer", "task manager", "settings", "terminal", "cmd", "powershell"]
media = ["spotify"]
web = ["google", "youtube", "github"]

# ───────────────────────────────────────────────────────────────────────
# UI — Terminal User Interface
# (From Crush [tui] options)
# ───────────────────────────────────────────────────────────────────────
[ui]
theme = "default"                              # "default", "minimal", "compact"
show_header = true                             # Show ASCII art header
show_system_status = true                      # Show CPU/RAM/Time in header
show_workspace_files = true                    # Show workspace files
show_nie_status = true                         # Show NIE model info
show_intent_classification = true              # Show intent + confidence on each command
compact_mode = false                           # Compact mode (Crush pattern)

# ───────────────────────────────────────────────────────────────────────
# TELEMETRY — Usage Tracking
# (From OpenJarvis telemetry)
# ───────────────────────────────────────────────────────────────────────
[telemetry]
enabled = false                                # Disable by default for privacy
db_path = "~/.nova/telemetry.db"

# ───────────────────────────────────────────────────────────────────────
# LOGGING — Action Audit Trail
# ───────────────────────────────────────────────────────────────────────
[logging]
enabled = true
log_dir = "logs"                               # Relative to nova package dir
log_format = "jsonl"                           # "jsonl" or "text"
max_entries = 10000                            # Max log entries before rotation
